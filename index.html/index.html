<!DOCTYPE html>
<html>

<head>
    <title>Virtual Closet</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>My Virtual Closet</h1>

<div class="add-section">

<h2>Add Clothing</h2>

<input type="text" id="itemName" placeholder="Clothing name">

<select id="category">
<option value="Top">Top</option>
<option value="Bottom">Bottom</option>
<option value="Shoes">Shoes</option>
</select>

<button onclick="addItem()">Add Item</button>

</div>

<div class="closet-section">

<h2>My Closet</h2>

<div id="closetList" class="closet-grid"></div>

</div>

<div class="outfit-section">

<h2>Outfit Recommendation</h2>

<button onclick="recommendOutfit()">Recommend Outfit</button>

<p id="outfitResult"></p>

</div>

</div>

<script src="script.js/script.js"></script>

</body>
</html>
